<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cosmic Number Guesser</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

        :root {
            --pink:   #f72585;
            --blue:   #4361ee;
            --cyan:   #4cc9f0;
            --green:  #4ade80;
            --yellow: #facc15;
            --orange: #fb923c;
            --bg1:    #1a1a2e;
            --bg2:    #0f3460;
        }

        html, body { width:100%; height:100%; }

        body {
            font-family: 'Orbitron', sans-serif;
            min-height: 100vh;
            min-height: 100dvh;
            background: linear-gradient(135deg, var(--bg1) 0%, #16213e 50%, var(--bg2) 100%);
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            position: relative;
            overflow-x: hidden;
            overflow-y: auto;
        }

        #space-canvas {
            position: fixed;
            inset: 0;
            z-index: 0;
        }



        .page-wrapper {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 620px;
            padding: clamp(12px,4vw,32px);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .top-bar {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0 12px;
            gap: 8px;
        }

        .sound-control {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(67,97,238,.5);
            padding: 7px 12px;
            border-radius: 50px;
            border: 1px solid var(--cyan);
            box-shadow: 0 0 10px rgba(76,201,240,.5);
            flex-shrink: 0;
        }
        .sound-icon {
            font-size: clamp(14px,4vw,20px);
            color: white;
            cursor: pointer;
            transition: color .2s, transform .2s;
            flex-shrink: 0;
        }
        .sound-icon:hover { color: var(--pink); transform: scale(1.1); }
        .volume-slider {
            width: clamp(60px,18vw,100px);
            -webkit-appearance: none;
            appearance: none;
            height: 6px;
            border-radius: 5px;
            background: linear-gradient(90deg, var(--pink), var(--cyan));
            outline: none;
            cursor: pointer;
        }
        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px; height: 16px;
            border-radius: 50%;
            background: white;
            cursor: pointer;
            box-shadow: 0 0 5px rgba(0,0,0,.5);
        }
        .volume-display {
            min-width: 34px;
            font-size: clamp(11px,3vw,14px);
            color: var(--cyan);
            font-weight: bold;
            white-space: nowrap;
        }

        .info-btn {
            position: relative;
            width: clamp(32px,9vw,40px);
            height: clamp(32px,9vw,40px);
            border-radius: 50%;
            background: linear-gradient(45deg, var(--blue), var(--cyan));
            color: white;
            font-family: 'Orbitron', sans-serif;
            font-weight: bold;
            font-size: clamp(14px,4vw,20px);
            border: none;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 10px rgba(76,201,240,.7);
            transition: all .3s;
            flex-shrink: 0;
        }
        .info-btn:hover {
            transform: scale(1.1);
            background: linear-gradient(45deg, var(--pink), var(--blue));
            box-shadow: 0 0 15px rgba(247,37,133,.7);
        }
        .easter-egg-count {
            position: absolute;
            top: -4px; right: -4px;
            background: var(--pink);
            border-radius: 50%;
            width: 18px; height: 18px;
            font-size: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            width: 100%;
            background: rgba(10,15,30,.85);
            border: 2px solid var(--cyan);
            border-radius: 15px;
            box-shadow: 0 0 30px rgba(76,201,240,.4), inset 0 0 20px rgba(76,201,240,.15);
            padding: clamp(16px,5vw,30px);
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .card::before {
            content: '';
            position: absolute;
            inset: -2px;
            background: linear-gradient(45deg,#ff00cc,#3333ff,#00ccff,#ff00cc);
            background-size: 400% 400%;
            z-index: -1;
            animation: gradAnim 15s ease infinite;
            border-radius: 17px;
        }
        @keyframes gradAnim {
            0%  { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100%{ background-position: 0% 50%; }
        }

        h1 {
            font-family: 'Press Start 2P', cursive;
            font-size: clamp(1rem,5vw,2.2rem);
            margin-bottom: 10px;
            color: var(--pink);
            text-shadow: 0 0 10px rgba(247,37,133,.7);
            letter-spacing: 1px;
            line-height: 1.4;
        }
        .subtitle {
            font-size: clamp(.75rem,3vw,1.1rem);
            margin-bottom: 20px;
            color: var(--cyan);
        }

        .game-stats {
            display: grid;
            grid-template-columns: repeat(4,1fr);
            gap: 8px;
            margin-bottom: 20px;
            background: rgba(0,0,0,.3);
            padding: clamp(10px,3vw,15px);
            border-radius: 10px;
            border: 1px solid var(--blue);
        }
        .stat { text-align: center; }
        .stat-value {
            font-size: clamp(1.2rem,5vw,1.8rem);
            font-weight: bold;
            color: var(--pink);
            text-shadow: 0 0 8px rgba(247,37,133,.7);
        }
        .stat-label {
            font-size: clamp(.55rem,2vw,.85rem);
            color: var(--cyan);
            text-transform: uppercase;
            letter-spacing: .5px;
        }

        .input-container { margin: 16px 0; }
        input[type="number"] {
            background: rgba(0,0,0,.5);
            border: 2px solid var(--blue);
            border-radius: 8px;
            padding: clamp(10px,3vw,15px);
            width: clamp(140px,55%,200px);
            font-size: clamp(1.1rem,5vw,1.5rem);
            color: white;
            text-align: center;
            font-family: 'Orbitron', sans-serif;
            outline: none;
            transition: border-color .3s, box-shadow .3s;
            -moz-appearance: textfield;
        }
        input[type="number"]::-webkit-outer-spin-button,
        input[type="number"]::-webkit-inner-spin-button { -webkit-appearance:none; margin:0; }
        input[type="number"]:focus {
            border-color: var(--pink);
            box-shadow: 0 0 15px rgba(247,37,133,.5);
        }

        .buttons {
            display: flex;
            justify-content: center;
            gap: 14px;
            margin: 16px 0;
            flex-wrap: wrap;
        }
        .btn {
            background: linear-gradient(45deg, var(--pink), var(--blue));
            border: none;
            border-radius: 50px;
            padding: clamp(10px,3vw,15px) clamp(18px,5vw,30px);
            font-size: clamp(.75rem,3vw,1rem);
            font-family: 'Orbitron', sans-serif;
            color: white;
            cursor: pointer;
            transition: transform .3s, box-shadow .3s;
            box-shadow: 0 5px 15px rgba(0,0,0,.3);
            letter-spacing: 1px;
            text-transform: uppercase;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            min-width: 130px;
        }
        .btn:hover  { transform: translateY(-4px); box-shadow: 0 8px 20px rgba(247,37,133,.6); }
        .btn:active { transform: translateY(0); }
        .btn-new    { background: linear-gradient(45deg, var(--blue), var(--cyan)); }
        .btn:disabled { opacity:.5; cursor:not-allowed; transform:none; }

        #result {
            min-height: 80px;
            background: rgba(0,0,0,.3);
            border-radius: 10px;
            padding: clamp(12px,3vw,20px);
            margin: 12px 0;
            border: 1px solid var(--pink);
            font-size: clamp(.8rem,3.5vw,1.2rem);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 6px;
            line-height: 1.5;
        }

        #history {
            max-height: clamp(140px,30vh,220px);
            overflow-y: auto;
            background: rgba(0,0,0,.3);
            border-radius: 10px;
            padding: 12px;
            border: 1px solid var(--cyan);
            -webkit-overflow-scrolling: touch;
        }
        .history-item {
            padding: 7px 10px;
            margin: 4px 0;
            border-radius: 5px;
            background: rgba(67,97,238,.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: clamp(.7rem,2.8vw,.95rem);
            gap: 8px;
        }
        .history-item:nth-child(odd) { background: rgba(76,201,240,.15); }
        .guess-number { font-weight:bold; color:var(--pink); flex-shrink:0; }
        .guess-value  { color: var(--cyan); }
        .guess-status { font-weight:bold; flex-shrink:0; }
        .correct { color: var(--green); }
        .low     { color: var(--yellow); }
        .high    { color: var(--orange); }
        #history::-webkit-scrollbar { width:6px; }
        #history::-webkit-scrollbar-track { background:rgba(0,0,0,.2); border-radius:3px; }
        #history::-webkit-scrollbar-thumb { background:linear-gradient(45deg,var(--pink),var(--blue)); border-radius:3px; }

        .game-info {
            margin-top: 14px;
            font-size: clamp(.6rem,2.2vw,.85rem);
            color: #9ca3af;
            line-height: 1.6;
        }

        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,.8);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }
        .modal.open { display: flex; }
        .modal-content {
            background: linear-gradient(135deg, var(--bg1), #16213e);
            padding: clamp(20px,5vw,30px);
            border-radius: 15px;
            border: 2px solid var(--pink);
            box-shadow: 0 0 30px rgba(247,37,133,.7);
            max-width: 400px;
            width: 100%;
            text-align: center;
            position: relative;
        }
        .modal h2 {
            color: var(--pink);
            margin-bottom: 10px;
            text-shadow: 0 0 10px rgba(247,37,133,.7);
            font-size: clamp(1rem,4vw,1.4rem);
        }
        .close-btn {
            position: absolute;
            top: 12px; right: 16px;
            background: transparent;
            border: none;
            color: var(--pink);
            font-size: 24px;
            cursor: pointer;
            transition: color .3s, transform .3s;
        }
        .close-btn:hover { color: var(--cyan); transform: scale(1.2); }

        @keyframes floatUp {
            0%   { opacity:1; transform:translate(-50%,-50%); }
            100% { opacity:0; transform:translate(-50%,-180%); }
        }
        .float-msg {
            position: fixed;
            top:50%; left:50%;
            transform: translate(-50%,-50%);
            font-size: clamp(1.4rem,6vw,2.5rem);
            color: var(--green);
            font-weight: bold;
            text-shadow: 0 0 10px rgba(76,201,240,.7);
            z-index: 2000;
            animation: floatUp 2s forwards;
            pointer-events: none;
            white-space: nowrap;
        }
    </style>
</head>
<body>

<canvas id="space-canvas"></canvas>

<div class="page-wrapper">
    <div class="top-bar">
        <div class="sound-control">
            <i class="fas fa-volume-up sound-icon" id="sound-icon"></i>
            <input type="range" min="0" max="1" step="0.1" value="1" class="volume-slider" id="volume-slider">
            <div class="volume-display" id="volume-display">100%</div>
        </div>
        <button class="info-btn" id="info-btn" aria-label="Developer info">
            i
            <div class="easter-egg-count" id="egg-count">0</div>
        </button>
    </div>

    <div class="card">
        <h1>COSMIC NUMBER GUESSER</h1>
        <div class="subtitle">Can you find the hidden number between 1 and 100?</div>

        <div class="game-stats">
            <div class="stat">
                <div class="stat-value" id="guess-count">0</div>
                <div class="stat-label">Guesses</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="remaining">10</div>
                <div class="stat-label">Left</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="min-val">1</div>
                <div class="stat-label">Min</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="max-val">100</div>
                <div class="stat-label">Max</div>
            </div>
        </div>

        <div class="input-container">
            <input type="number" id="guess-input" min="1" max="100" placeholder="1–100"
                   inputmode="numeric" pattern="[0-9]*" autocomplete="off">
        </div>

        <div class="buttons">
            <button class="btn" id="submit-btn">Submit</button>
            <button class="btn btn-new" id="new-game-btn">New Game</button>
        </div>

        <div id="result">Enter a number and press Submit!</div>
        <div id="history"></div>

        <div class="game-info">
            <p>Tip: press <strong>Enter</strong> to submit. Drag the planets &amp; asteroids!</p>
        </div>
    </div>
</div>

<div id="info-modal" class="modal" role="dialog" aria-modal="true">
    <div class="modal-content">
        <button class="close-btn" id="close-btn" aria-label="Close">&times;</button>
        <h2>DEV — Tanjim Khan</h2>
    </div>
</div>

<audio id="click-sound" preload="auto"><source src="sounds/click.mp3" type="audio/mpeg"></audio>
<audio id="start-sound" preload="auto"><source src="sounds/start.mp3" type="audio/mpeg"></audio>
<audio id="win-sound"   preload="auto"><source src="sounds/win.mp3"   type="audio/mpeg"></audio>
<audio id="wrong-sound" preload="auto"><source src="sounds/wrong.mp3" type="audio/mpeg"></audio>
<audio id="cong-sound"  preload="auto"><source src="sounds/cong.mp3"  type="audio/mpeg"></audio>

<script>
/* ══════════════════════════════════════════
   SPACE BACKGROUND ENGINE
══════════════════════════════════════════ */
(function spaceEngine() {
    const canvas  = document.getElementById('space-canvas');
    const ctx     = canvas.getContext('2d');
    let W, H, dragging = null, dragOffX = 0, dragOffY = 0;

    function resize() {
        W = canvas.width  = window.innerWidth;
        H = canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', () => { resize(); repositionObjects(); });
    resize();

    /* ── Twinkling stars ── */
    const stars = Array.from({length:200}, () => ({
        x: Math.random(), y: Math.random(),
        r: Math.random()*1.6+.2,
        alpha: Math.random()*.7+.3,
        phase: Math.random()*Math.PI*2,
        spd: Math.random()*.015+.004
    }));

    /* ── Nebula blobs ── */
    const nebulas = [
        { rx:.12, ry:.28, rw:280, rh:190, col:'rgba(247,37,133,' ,a:.07 },
        { rx:.85, ry:.60, rw:320, rh:210, col:'rgba(67,97,238,'  ,a:.08 },
        { rx:.50, ry:.88, rw:260, rh:170, col:'rgba(76,201,240,' ,a:.06 },
        { rx:.92, ry:.08, rw:210, rh:160, col:'rgba(114,9,183,'  ,a:.07 },
        { rx:.35, ry:.45, rw:180, rh:120, col:'rgba(76,201,240,' ,a:.04 },
    ];

    /* ── Planets ── */
    function makePlanets() { return [
        {
            id:'jupiter', tip:'🪐 Jupiter — Largest planet! Drag me!',
            x:W*.78, y:H*.22, r:58, vx:.11, vy:.07,
            bands:['#c88b3a','#e8b97a','#d4956c','#c4784a','#b8602a'],
            rings:false, glow:'rgba(200,139,58,.45)',
            moons:[{orbit:88,  ang:0,   spd:.018, r:7,  col:'#aaaacc'}]
        },
        {
            id:'saturn', tip:'🪐 Saturn — Lord of the rings! Drag me!',
            x:W*.15, y:H*.70, r:46, vx:-.09, vy:.10,
            bands:['#d4b483','#e8cfa0','#c8a46c','#b89060'],
            rings:true, glow:'rgba(212,180,131,.45)',
            moons:[{orbit:80, ang:2.1, spd:.022, r:5, col:'#bbbbaa'}]
        },
        {
            id:'earth', tip:'🌍 Earth — Home! Drag me!',
            x:W*.88, y:H*.65, r:31, vx:-.14, vy:-.08,
            bands:['#1565c0','#1e88e5','#2196f3','#43a047','#388e3c'],
            rings:false, glow:'rgba(30,136,229,.55)',
            moons:[{orbit:54, ang:1.0, spd:.03, r:5, col:'#ddddcc'}]
        },
        {
            id:'mars', tip:'🔴 Mars — The Red Planet! Drag me!',
            x:W*.08, y:H*.17, r:22, vx:.16, vy:.12,
            bands:['#c1440e','#e06030','#b03010','#d05020'],
            rings:false, glow:'rgba(193,68,14,.5)',
            moons:[]
        },
        {
            id:'neptune', tip:'🔵 Neptune — Ice Giant! Drag me!',
            x:W*.58, y:H*.06, r:27, vx:-.10, vy:.09,
            bands:['#3f51b5','#5c6bc0','#303f9f','#7986cb'],
            rings:false, glow:'rgba(63,81,181,.5)',
            moons:[]
        }
    ]; }

    /* ── Asteroids ── */
    function makeAsteroids() {
        return Array.from({length:14}, (_,i) => ({
            id:'ast'+i,
            tip:'☄️ Asteroid — Click & drag to throw!',
            x: Math.random()*W, y: Math.random()*H,
            r: Math.random()*10+5,
            vx: (Math.random()-.5)*.6,
            vy: (Math.random()-.5)*.6,
            rot: Math.random()*Math.PI*2,
            rotSpd: (Math.random()-.5)*.025,
            col: ['#888','#aaa','#666','#bbb','#999'][i%5]
        }));
    }

    /* ── Comet ── */
    function makeComet() {
        return { id:'comet', tip:'💫 Comet — Speeding through space!',
            x:-80, y:H*.3, vx:2.5, vy:.35, r:6, tail:[] };
    }

    let planets   = makePlanets();
    let asteroids = makeAsteroids();
    let comet     = makeComet();

    function repositionObjects() {
        planets   = makePlanets();
        asteroids = makeAsteroids();
        comet     = makeComet();
    }

    /* ── Shooting stars ── */
    let shooters = [];
    setInterval(() => {
        shooters.push({
            x: Math.random()*W, y:0,
            vx:(Math.random()*3+1.5)*(Math.random()<.5?1:-1),
            vy: Math.random()*3+1.5,
            life:1, len:Math.random()*90+40
        });
    }, 2800);

    /* ── Draw planet ── */
    function drawPlanet(p) {
        const {x,y,r} = p;

        // Outer glow
        const grd = ctx.createRadialGradient(x,y,r*.3,x,y,r*2.5);
        grd.addColorStop(0, p.glow); grd.addColorStop(1,'transparent');
        ctx.beginPath(); ctx.arc(x,y,r*2.5,0,Math.PI*2);
        ctx.fillStyle=grd; ctx.fill();

        // Saturn rings (behind planet)
        if (p.rings) {
            ctx.save(); ctx.translate(x,y); ctx.rotate(.32); ctx.scale(1,.28);
            for (const [mult,alpha,lw] of [[1.95,.75,r*.4],[2.35,.4,r*.22],[2.6,.2,r*.12]]) {
                ctx.beginPath(); ctx.arc(0,0,r*mult,0,Math.PI*2);
                ctx.strokeStyle=`rgba(212,180,131,${alpha})`; ctx.lineWidth=lw; ctx.stroke();
            }
            ctx.restore();
        }

        // Body
        ctx.save();
        ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.clip();
        const bodyGrd = ctx.createLinearGradient(x-r,y-r,x+r,y+r);
        p.bands.forEach((c,i) => bodyGrd.addColorStop(i/(p.bands.length-1),c));
        ctx.fillStyle=bodyGrd; ctx.fillRect(x-r,y-r,r*2,r*2);

        // Surface bands
        for (let b=1; b<5; b++) {
            const by = y-r+(b*(r*2/5));
            ctx.beginPath(); ctx.moveTo(x-r,by); ctx.lineTo(x+r,by);
            ctx.strokeStyle='rgba(0,0,0,.13)'; ctx.lineWidth=r*.2; ctx.stroke();
        }
        // Highlight spot
        ctx.beginPath(); ctx.arc(x-r*.3,y-r*.3,r*.32,0,Math.PI*2);
        ctx.fillStyle='rgba(255,255,255,.2)'; ctx.fill();
        ctx.restore();

        // Moons
        p.moons.forEach(m => {
            m.ang += m.spd;
            const mx = x+Math.cos(m.ang)*m.orbit;
            const my = y+Math.sin(m.ang)*m.orbit*.55;
            // Orbit trace
            ctx.save(); ctx.translate(x,y); ctx.scale(1,.55);
            ctx.beginPath(); ctx.arc(0,0,m.orbit,0,Math.PI*2);
            ctx.strokeStyle='rgba(255,255,255,.08)'; ctx.lineWidth=1; ctx.stroke();
            ctx.restore();
            // Moon body
            ctx.beginPath(); ctx.arc(mx,my,m.r,0,Math.PI*2);
            ctx.fillStyle=m.col; ctx.fill();
            ctx.beginPath(); ctx.arc(mx-m.r*.2,my-m.r*.2,m.r*.28,0,Math.PI*2);
            ctx.fillStyle='rgba(255,255,255,.22)'; ctx.fill();
        });
    }

    /* ── Draw asteroid ── */
    function drawAsteroid(a) {
        ctx.save(); ctx.translate(a.x,a.y); ctx.rotate(a.rot);
        ctx.beginPath();
        const pts=8;
        for (let i=0;i<pts;i++) {
            const ang=(i/pts)*Math.PI*2;
            const wobble = a.r*(.68+Math.sin(i*2.7+1)*.32);
            i===0 ? ctx.moveTo(Math.cos(ang)*wobble,Math.sin(ang)*wobble)
                  : ctx.lineTo(Math.cos(ang)*wobble,Math.sin(ang)*wobble);
        }
        ctx.closePath();
        ctx.fillStyle=a.col; ctx.fill();
        ctx.strokeStyle='rgba(255,255,255,.12)'; ctx.lineWidth=1; ctx.stroke();
        // Craters
        ctx.beginPath(); ctx.arc(a.r*.2,-a.r*.2,a.r*.26,0,Math.PI*2);
        ctx.strokeStyle='rgba(0,0,0,.3)'; ctx.lineWidth=1.5; ctx.stroke();
        ctx.beginPath(); ctx.arc(-a.r*.3,a.r*.1,a.r*.15,0,Math.PI*2);
        ctx.strokeStyle='rgba(0,0,0,.2)'; ctx.lineWidth=1; ctx.stroke();
        ctx.restore();
    }

    /* ── Draw comet ── */
    function drawComet(c) {
        if (c.tail.length>1) {
            for (let i=1;i<c.tail.length;i++) {
                const p1=c.tail[i-1], p2=c.tail[i];
                const frac=i/c.tail.length;
                ctx.beginPath(); ctx.moveTo(p1.x,p1.y); ctx.lineTo(p2.x,p2.y);
                ctx.strokeStyle=`rgba(180,220,255,${frac*.55})`;
                ctx.lineWidth=frac*c.r*1.8; ctx.lineCap='round'; ctx.stroke();
            }
        }
        const grd=ctx.createRadialGradient(c.x,c.y,0,c.x,c.y,c.r*2.5);
        grd.addColorStop(0,'rgba(255,255,255,1)');
        grd.addColorStop(.5,'rgba(180,230,255,.8)');
        grd.addColorStop(1,'transparent');
        ctx.beginPath(); ctx.arc(c.x,c.y,c.r*2.5,0,Math.PI*2);
        ctx.fillStyle=grd; ctx.fill();
    }

    /* ── Hit test ── */
    function hitTest(mx,my) {
        for (const p of planets) {
            if (Math.hypot(mx-p.x,my-p.y)<p.r*2.8) return p;
        }
        for (const a of asteroids) {
            if (Math.hypot(mx-a.x,my-a.y)<a.r+10) return a;
        }
        if (Math.hypot(mx-comet.x,my-comet.y)<comet.r*4) return comet;
        return null;
    }

    /* ── Input helpers ── */
    function pos(e) {
        return e.touches
            ? {x:e.touches[0].clientX, y:e.touches[0].clientY}
            : {x:e.clientX, y:e.clientY};
    }
    function startDrag(e) {
        const {x,y}=pos(e);
        const hit=hitTest(x,y);
        if (!hit) return;
        dragging=hit; dragOffX=hit.x-x; dragOffY=hit.y-y;
        if ('vx' in hit) { hit._sx=hit.vx; hit._sy=hit.vy; hit.vx=0; hit.vy=0; }
        canvas.style.cursor='grabbing';
    }
    function moveDrag(e) {
        const {x,y}=pos(e);
        if (dragging) {
            dragging.x=x+dragOffX; dragging.y=y+dragOffY;
        } else {
            const hit=hitTest(x,y);
            canvas.style.cursor=hit?'grab':'default';
        }
    }
    function endDrag() {
        if (!dragging) return;
        if ('_sx' in dragging) {
            dragging.vx = -dragging._sx * (asteroids.includes(dragging)?1.5:1);
            dragging.vy = -dragging._sy * (asteroids.includes(dragging)?1.5:1);
        }
        if (asteroids.includes(dragging)) {
            dragging.vx=(Math.random()-.5)*2.5;
            dragging.vy=(Math.random()-.5)*2.5;
        }
        dragging=null;
        canvas.style.cursor='default';
    }

    canvas.addEventListener('mousedown',  startDrag);
    canvas.addEventListener('mousemove',  moveDrag);
    canvas.addEventListener('mouseup',    endDrag);
    canvas.addEventListener('mouseleave', endDrag);
    canvas.addEventListener('touchstart', e=>{e.preventDefault();startDrag(e);},{passive:false});
    canvas.addEventListener('touchmove',  e=>{e.preventDefault();moveDrag(e);}, {passive:false});
    canvas.addEventListener('touchend',   e=>{endDrag();},{passive:false});

    /* ── Wrap object ── */
    function wrap(obj) {
        const pad=obj.r*3+20;
        if (obj.x<-pad) obj.x=W+pad; else if(obj.x>W+pad) obj.x=-pad;
        if (obj.y<-pad) obj.y=H+pad; else if(obj.y>H+pad) obj.y=-pad;
    }

    /* ── Main loop ── */
    function loop() {
        ctx.clearRect(0,0,W,H);

        // Nebulas
        nebulas.forEach(n=>{
            const nx=n.rx*W, ny=n.ry*H;
            const grd=ctx.createRadialGradient(nx,ny,0,nx,ny,n.rw);
            grd.addColorStop(0,n.col+n.a+')');
            grd.addColorStop(1,n.col+'0)');
            ctx.save(); ctx.translate(nx,ny); ctx.scale(1,n.rh/n.rw);
            ctx.beginPath(); ctx.arc(0,0,n.rw,0,Math.PI*2);
            ctx.restore(); ctx.fillStyle=grd; ctx.fill();
        });

        // Stars
        stars.forEach(s=>{
            s.phase+=s.spd;
            const a=s.alpha*(.45+.55*Math.sin(s.phase));
            ctx.beginPath(); ctx.arc(s.x*W,s.y*H,s.r,0,Math.PI*2);
            ctx.fillStyle=`rgba(255,255,255,${a})`; ctx.fill();
        });

        // Shooting stars
        shooters=shooters.filter(s=>s.life>0);
        shooters.forEach(s=>{
            const endX=s.x-s.vx*(s.len/Math.abs(s.vx));
            const endY=s.y-s.vy*(s.len/Math.abs(s.vx));
            const g=ctx.createLinearGradient(s.x,s.y,endX,endY);
            g.addColorStop(0,`rgba(255,255,255,${s.life})`);
            g.addColorStop(1,'rgba(255,255,255,0)');
            ctx.beginPath(); ctx.moveTo(s.x,s.y); ctx.lineTo(endX,endY);
            ctx.strokeStyle=g; ctx.lineWidth=1.5; ctx.stroke();
            s.x+=s.vx; s.y+=s.vy; s.life-=.018;
        });

        // Planets
        planets.forEach(p=>{
            if (dragging!==p) { p.x+=p.vx; p.y+=p.vy; wrap(p); }
            drawPlanet(p);
        });

        // Asteroids
        asteroids.forEach(a=>{
            if (dragging!==a) { a.x+=a.vx; a.y+=a.vy; wrap(a); }
            a.rot+=a.rotSpd;
            drawAsteroid(a);
        });

        // Comet
        if (dragging!==comet) {
            comet.tail.push({x:comet.x,y:comet.y});
            if (comet.tail.length>45) comet.tail.shift();
            comet.x+=comet.vx; comet.y+=comet.vy;
            if (comet.x>W+120||comet.y<-120||comet.y>H+120) {
                comet.x=-80; comet.y=Math.random()*H*.8+H*.1; comet.tail=[];
            }
        }
        drawComet(comet);

        requestAnimationFrame(loop);
    }
    requestAnimationFrame(loop);
})();


/* ══════════════════════════════════════════
   GAME ENGINE
══════════════════════════════════════════ */
(function gameEngine() {
    'use strict';
    let target, guessCount, gameActive, maxGuesses, infoClicks, volume;
    let knownMin=1, knownMax=100;

    const $ = id => document.getElementById(id);
    const guessInput   = $('guess-input');
    const submitBtn    = $('submit-btn');
    const newGameBtn   = $('new-game-btn');
    const resultDiv    = $('result');
    const historyDiv   = $('history');
    const guessCountEl = $('guess-count');
    const remainingEl  = $('remaining');
    const minEl        = $('min-val');
    const maxEl        = $('max-val');
    const infoBtn      = $('info-btn');
    const modal        = $('info-modal');
    const closeBtn     = $('close-btn');
    const eggCount     = $('egg-count');
    const soundIcon    = $('sound-icon');
    const volSlider    = $('volume-slider');
    const volDisplay   = $('volume-display');
    const sounds = {
        click:$('click-sound'), start:$('start-sound'),
        win:$('win-sound'), wrong:$('wrong-sound'), cong:$('cong-sound')
    };

    function setVolume(v) {
        volume=v;
        for (const s of Object.values(sounds)) { try{s.volume=v;}catch(_){} }
        volDisplay.textContent=`${Math.round(v*100)}%`;
        volSlider.value=v;
        soundIcon.className = v===0 ? 'fas fa-volume-mute sound-icon'
                            : v<.5  ? 'fas fa-volume-down sound-icon'
                                    : 'fas fa-volume-up sound-icon';
        soundIcon.style.color = v===0 ? '#f72585' : '';
    }
    function play(name) {
        const s=sounds[name]; if(!s) return;
        try{s.currentTime=0; s.volume=volume; s.play();}catch(_){}
    }
    function floatMsg(text) {
        const el=document.createElement('div');
        el.className='float-msg'; el.textContent=text;
        document.body.appendChild(el);
        setTimeout(()=>el.remove(),2000);
    }

    function initGame() {
        target=Math.floor(Math.random()*100)+1;
        guessCount=0; gameActive=true; maxGuesses=10; infoClicks=0;
        knownMin=1; knownMax=100;
        guessInput.value=''; guessInput.disabled=false; submitBtn.disabled=false;
        resultDiv.innerHTML='Enter a number and press Submit!';
        historyDiv.innerHTML='';
        guessCountEl.textContent=0; remainingEl.textContent=maxGuesses;
        minEl.textContent=1; maxEl.textContent=100;
        eggCount.textContent=0;
        play('start'); guessInput.focus();
    }

    function checkGuess() {
        if (!gameActive) return;
        const val=parseInt(guessInput.value,10);
        if (isNaN(val))     { resultDiv.textContent='Please enter a number!'; return; }
        if (val<1||val>100) { resultDiv.textContent='Number must be between 1 and 100!'; return; }

        play('click');
        guessCount++; guessCountEl.textContent=guessCount;
        remainingEl.textContent=maxGuesses-guessCount;

        let statusText='', statusClass='', html='';

        if (val===target) {
            html=`<span style="font-size:clamp(1.2rem,5vw,1.8rem);color:var(--green)">🎉 EPIC WIN! 🎉</span>You found ${target} in ${guessCount} guess${guessCount>1?'es':''}!`;
            statusText='CORRECT!'; statusClass='correct';
            gameActive=false; guessInput.disabled=submitBtn.disabled=true;
            play('win');
        } else if (guessCount>=maxGuesses) {
            html=`<span style="font-size:clamp(1.2rem,5vw,1.8rem);color:#f87171">GAME OVER!</span>The number was ${target}. Better luck!`;
            statusText='OUT'; statusClass='';
            gameActive=false; guessInput.disabled=submitBtn.disabled=true;
            play('wrong');
        } else if (val<target) {
            knownMin=Math.max(knownMin,val+1);
            html=`<span style="color:var(--yellow)">⬆ TOO LOW!</span>Try higher. ${maxGuesses-guessCount} left.`;
            statusText='TOO LOW'; statusClass='low'; play('wrong');
        } else {
            knownMax=Math.min(knownMax,val-1);
            html=`<span style="color:var(--orange)">⬇ TOO HIGH!</span>Try lower. ${maxGuesses-guessCount} left.`;
            statusText='TOO HIGH'; statusClass='high'; play('wrong');
        }

        minEl.textContent=knownMin; maxEl.textContent=knownMax;
        resultDiv.innerHTML=html;

        const item=document.createElement('div');
        item.className='history-item';
        item.innerHTML=`<span class="guess-number">#${guessCount}</span><span class="guess-value">${val}</span><span class="guess-status ${statusClass}">${statusText}</span>`;
        historyDiv.appendChild(item);
        historyDiv.scrollTop=historyDiv.scrollHeight;
        guessInput.value=''; if(gameActive) guessInput.focus();
    }

    infoBtn.addEventListener('click',()=>{
        modal.classList.add('open'); play('click');
        infoClicks++; eggCount.textContent=infoClicks;
        if (infoClicks===6) {
            maxGuesses+=5; remainingEl.textContent=maxGuesses-guessCount;
            play('cong'); floatMsg('+5 extra tries!');
        }
    });
    function closeModal(){ modal.classList.remove('open'); play('click'); }
    closeBtn.addEventListener('click',closeModal);
    modal.addEventListener('click',e=>{if(e.target===modal)closeModal();});

    submitBtn.addEventListener('click',checkGuess);
    newGameBtn.addEventListener('click',()=>{ play('click'); initGame(); });
    guessInput.addEventListener('keydown',e=>{ if(e.key==='Enter') checkGuess(); });
    volSlider.addEventListener('input',e=>setVolume(parseFloat(e.target.value)));
    soundIcon.addEventListener('click',()=>setVolume(volume>0?0:0.5));

    initGame();
    setVolume(1.0);
})();
</script>
